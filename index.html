<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WarungKu</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

        <h1>🛒 WarungKu</h1>

        <div class="dashboard-box">

            <div class="dashboard-card">
                <h3>📦</h3>
                <h2 id="dashboardTotalBarang">0</h2>
                <p>Total Barang</p>
            </div>

            <div class="dashboard-card">
                <h3>📚</h3>
                <h2 id="dashboardTotalStok">0</h2>
                <p>Total Stok</p>
            </div>

            <div id="cardStokMenipis" class="dashboard-card">
                <h3>⚠️</h3>
                <h2 id="dashboardStokMenipis">0</h2>
                <p>Stok Menipis</p>
            </div>

            <div id="cardBarangHabis" class="dashboard-card">
                <h3>❌</h3>
                <h2 id="dashboardBarangHabis">0</h2>
                <p>Barang Habis</p>
            </div>

        </div>

        <div id="dashboardDetail" class="dashboard-detail">

            <h3 id="dashboardDetailTitle"></h3>

            <ul id="dashboardDetailList"></ul>

        </div>

        <div class="form-box">

            <input type="text"
                   id="itemName"
                   placeholder="Nama Barang">

            <input type="number"
                   id="itemStock"
                   placeholder="Jumlah Stok">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Cari barang..."
            >

            <button 
                id="addButton"
                onclick="addItem()">
                
                Tambah Barang
                
            </button>

        </div>

        <div class="list-box">

            <h2>📦 Daftar Barang</h2>

                <p id="totalItems">
                    Total Barang : 0
                </p>          

            <ul id="itemList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
